[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "process-flow-kernel"
version = "0.1.0"
description = "Python process-flow geometry kernel."
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
process_flow_kernel = ["py.typed"]
