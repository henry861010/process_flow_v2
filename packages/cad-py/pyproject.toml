[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "process-flow-cad"
version = "0.1.0"
description = "Python CadQuery/OCP CAD export package for process-flow geometry."
requires-python = ">=3.11"
dependencies = [
  "cadquery>=2.5,<3",
  "process-flow-kernel",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
process_flow_cad = ["py.typed"]
