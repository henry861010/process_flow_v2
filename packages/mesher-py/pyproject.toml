[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "process-flow-mesher"
version = "0.1.0"
description = "Mesh and text CDB export utilities for process-flow geometry."
requires-python = ">=3.11"
dependencies = [
  "matplotlib>=3.8",
  "numpy>=1.26",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
process_flow_mesher = ["py.typed"]
