[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "process-flow-steps"
version = "0.1.0"
description = "Python process-flow step modules."
requires-python = ">=3.11"
dependencies = ["process-flow-kernel"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
process_flow_steps = ["py.typed"]
